project:
  title: "Multi-Rate Sensor Fusion for Drone Propeller Fault Detection"
  seed: 42

data:
  raw_directory: "data/raw/dronepropb/DronePropB Ground Testing Dataset"
  segment_seconds: 30.0
  window_seconds: 1.0
  overlap_fraction: 0.5
  cache_file: "outputs/cache/recording_features.csv"
  force_recompute: false

validation:
  inner_splits: 4
  search_iterations: 12
  bootstrap_iterations: 3000
  run_leave_one_speed_out: true

compute:
  use_gpu: true
  cpu_threads: 8

output:
  directory: "outputs"
  figure_dpi: 600
