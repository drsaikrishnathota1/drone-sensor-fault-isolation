project:
  title: Speed-Robust IMU Detection of Propeller Faults in Drones
  random_seed: 42
data:
  raw_directory: data/raw/dronepropb/DronePropB Ground Testing Dataset
  sampling_rate_hz: 1000
  steady_state_seconds: 30
  window_seconds: 1.0
  overlap_fraction: 0.5
experiment:
  held_out_speeds:
  - 1
  - 2
  - 3
  random_forest:
    number_of_trees: 300
    maximum_depth: 12
    minimum_samples_leaf: 2
output:
  results_directory: results
  figures_directory: figures
